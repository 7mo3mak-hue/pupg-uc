<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7S — شحن UC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #050609;
  --bg2:     #080A10;
  --surface: #0C0F1A;
  --gold:    #C8A84B;
  --gold2:   #F0D880;
  --gold3:   #FFF8D6;
  --dim:     rgba(200,170,75,0.08);
  --edge:    rgba(200,170,75,0.14);
  --edge-h:  rgba(200,170,75,0.55);
  --text:    #EDE9DF;
  --muted:   #4A4E66;
  --green:   #22C55E;
  --accent:  #7C5FFF;
  --wa:      #25D366;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── STARFIELD ── */
#stars-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}

/* ── GLOW ── */
#glow-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .45;
}

/* ── METEORS ── */
#meteor-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
}

/* ── NOISE ── */
body::before {
  content:''; position:fixed; inset:0; z-index:2; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .022;
}

/* ─────────────────────────────── BRAND ─── */
.brand-wrap {
  position: relative; z-index: 10;
  display: flex; justify-content: center;
  padding: 64px 0 0;
}

/* stage holds the hologram projection effect & the logo itself */
.holo-stage {
  position: relative;
  width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
}

/* projector base glow on the "floor" beneath the hologram */
.holo-base {
  position: absolute;
  bottom: 8px; left: 50%;
  width: 120px; height: 14px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(110,210,255,0.45) 0%, rgba(80,180,255,0.18) 55%, transparent 100%);
  filter: blur(3px);
  animation: holoBaseFlicker 2.6s ease-in-out infinite;
}
@keyframes holoBaseFlicker {
  0%, 100% { opacity: .75; }
  50%      { opacity: 1; }
}

/* expanding concentric rings that pulse outward like a hologram projector */
.holo-rings { position: absolute; inset: 0; }
.holo-rings span {
  position: absolute; left: 50%; top: 50%;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(110,210,255,0.4);
  transform: translate(-50%,-50%) scale(0.4);
  opacity: 0;
  animation: holoRing 3.2s cubic-bezier(.2,.6,.4,1) infinite;
}
.holo-rings span:nth-child(2) { animation-delay: 1.05s; }
.holo-rings span:nth-child(3) { animation-delay: 2.1s; }
@keyframes holoRing {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
  12%  { opacity: .55; }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(4.2); }
}

/* vertical scan beam sweeping across the hologram */
.holo-scan {
  position: absolute;
  left: 50%; top: 6%;
  width: 156px; height: 88%;
  transform: translateX(-50%);
  overflow: hidden;
  border-radius: 50%/8%;
  pointer-events: none;
}
.holo-scan::before {
  content: '';
  position: absolute;
  left: 0; right: 0; height: 26px;
  background: linear-gradient(to bottom, transparent, rgba(140,225,255,0.55), transparent);
  animation: holoSweep 2.8s ease-in-out infinite;
}
@keyframes holoSweep {
  0%   { top: -10%; }
  100% { top: 110%; }
}

/* the logo itself, rendered as a translucent cyan hologram projection */
.holo-logo {
  position: relative;
  filter: drop-shadow(0 0 16px rgba(90,200,255,0.5));
  animation: holoFloat 4s ease-in-out infinite;
}
@keyframes holoFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* horizontal scan-line texture over the logo disc */
.holo-lines {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(150,230,255,0.16) 0px,
    rgba(150,230,255,0.16) 1px,
    transparent 1px,
    transparent 4px
  );
  mix-blend-mode: screen;
  pointer-events: none;
}

/* irregular flicker / glitch overlay typical of hologram projections */
.holo-flicker {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: rgba(130,220,255,0.08);
  mix-blend-mode: screen;
  opacity: 0;
  pointer-events: none;
  animation: holoGlitch 5s steps(1) infinite;
}
@keyframes holoGlitch {
  0%, 100% { opacity: 0; }
  41%      { opacity: 0; }
  42%      { opacity: .5; transform: translateX(1.5px); }
  43%      { opacity: 0; }
  62%      { opacity: 0; }
  63%      { opacity: .35; transform: translateX(-2px); }
  64%      { opacity: 0; }
  88%      { opacity: 0; }
  89%      { opacity: .45; transform: translateX(1px); }
  90%      { opacity: 0; }
}

/* tiny drifting light particles inside the projection volume */
.holo-particles { position: absolute; inset: 0; pointer-events: none; }
.holo-particles span {
  position: absolute;
  width: 2.5px; height: 2.5px;
  border-radius: 50%;
  background: rgba(160,230,255,0.85);
  box-shadow: 0 0 4px rgba(120,210,255,0.8);
  animation: holoDrift linear infinite;
}
@keyframes holoDrift {
  0%   { opacity: 0; transform: translateY(0); }
  10%  { opacity: .9; }
  90%  { opacity: .5; }
  100% { opacity: 0; transform: translateY(-90px); }
}

/* The beating heart — the logo circle, recolored as a hologram */
.logo-orbit {
  position: relative;
  width: 150px; height: 150px;
  display: flex; align-items: center; justify-content: center;
}

.logo-disc {
  width: 115px; height: 115px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 30% 25%, rgba(80,190,255,0.16) 0%, rgba(20,60,90,0.12) 60%, rgba(5,20,35,0.08) 100%);
  border: 1px solid rgba(120,210,255,0.45);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(110,200,255,0.12),
    0 0 45px rgba(90,190,255,0.28),
    inset 0 1px 0 rgba(180,235,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.35);
}

.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 800;
  font-size: 56px;
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(155deg, #EFFCFF 0%, #9FE3FF 35%, #4FB8F5 65%, #1E6FA8 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  opacity: 0.92;
  animation: logoPulse 3.6s ease-in-out infinite;
  position: relative; z-index: 1;
}

@keyframes logoPulse {
  0%, 100% { filter: drop-shadow(0 0 7px rgba(90,200,255,0.55)); transform: scale(1); }
  50%       { filter: drop-shadow(0 0 14px rgba(120,215,255,0.8)); transform: scale(1.025); }
}

/* label below circle */
.brand-label {
  position: relative; z-index: 10;
  text-align: center;
  margin-top: 18px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}

.brand-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.brand-rule {
  width: 1px; height: 50px;
  background: linear-gradient(to bottom, rgba(200,168,75,0.4), transparent);
  margin: 10px auto 0;
}

/* ─────────────────────────────── HERO ─── */
.hero {
  position: relative; z-index: 10;
  text-align: center;
  padding: 0 24px 52px;
}

.hero h1 {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: clamp(22px, 5vw, 42px);
  line-height: 1.25;
  color: var(--text);
  letter-spacing: -0.5px;
}

.hero h1 .g {
  background: linear-gradient(90deg, var(--gold2) 0%, var(--gold3) 50%, var(--gold2) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: shimmerText 3s linear infinite;
}

@keyframes shimmerText {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.hero-sub {
  color: var(--muted);
  font-size: 14px;
  margin-top: 10px;
  letter-spacing: 0.2px;
}

/* badges */
.hero-badges {
  display: flex; justify-content: center;
  gap: 8px; margin-top: 18px; flex-wrap: wrap;
}

.badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--edge);
  background: var(--dim);
  font-size: 11.5px;
  color: var(--muted);
  letter-spacing: 0.3px;
}

.badge .dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.badge .dot.g { background: var(--green); box-shadow: 0 0 6px var(--green); }
.badge .dot.o { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

/* ─────────────────────────────── LIST ─── */
.list-wrap {
  position: relative; z-index: 10;
  max-width: 640px; margin: 0 auto;
  padding: 0 16px 80px;
  display: flex; flex-direction: column; gap: 8px;
}

/* ─────────────────────────────── CARD ─── */
.card {
  background: rgba(255,255,255,0.045);
  -webkit-backdrop-filter: blur(22px) saturate(120%);
  backdrop-filter: blur(22px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  animation: fadeUp .55s both;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 0 0 1px rgba(255,255,255,0.04);
  transition: border-color .3s, transform .3s, box-shadow .3s, background .3s;
}

/* top sheen */
.card::before {
  content:'';
  position: absolute; top:0; left:10%; right:10%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  pointer-events: none;
}

/* right glow on hover */
.card::after {
  content:'';
  position: absolute; inset: 0;
  border-radius: 18px;
  background: radial-gradient(600px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.06), transparent 60%);
  pointer-events: none;
  opacity: 0;
  transition: opacity .4s;
}

.card:hover {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.07);
  transform: translateY(-2px);
  box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1), 0 0 40px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.1);
}
.card:hover::after { opacity: 1; }

/* ── CARD TOP ── */
.card-top {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 17px 16px 20px;
}

/* icon */
.card-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(200,168,75,0.13) 0%, rgba(200,168,75,0.04) 100%);
  border: 1px solid rgba(200,168,75,0.22);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  flex-shrink: 0;
}
.card-icon::after {
  content:'';
  position:absolute; inset:0; border-radius: 14px;
  background: radial-gradient(ellipse at 40% 30%, rgba(255,248,200,0.08), transparent 70%);
}
.card-icon svg { width: 30px; height: 30px; position: relative; z-index:1; }

/* amounts */
.card-info { display: flex; flex-direction: column; gap: 3px; }

.uc-amount {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 24px;
  color: var(--text); line-height: 1;
}
.uc-amount small {
  font-size: 12px; color: var(--muted);
  font-weight: 500; margin-right: 3px;
}

.uc-old {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; color: var(--muted);
  text-decoration: line-through; font-weight: 400;
}

/* right side */
.card-right {
  display: flex; flex-direction: column; align-items: flex-start; gap: 5px;
}

.price-now {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 22px;
  background: linear-gradient(135deg, var(--gold2), var(--gold3));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  line-height: 1;
}
.price-now small { font-size: 11px; color: var(--muted); font-weight: 500; margin-right:2px; }

.disc-pill {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9.5px; font-weight: 700;
  color: #0E0900;
  background: linear-gradient(90deg, #9A7020, var(--gold2), #B89030);
  border-radius: 20px;
  padding: 2.5px 9px;
  letter-spacing: .4px;
}

/* ── EXPAND HINT ── */
.card-hint {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; padding: 0 16px 12px;
  font-size: 11px; color: var(--muted);
  opacity: .6; transition: opacity .25s, color .25s;
}
.card-hint svg { width: 12px; height: 12px; transition: transform .35s; }
.card:hover .card-hint { opacity: 1; color: var(--gold); }
.card.open .card-hint svg { transform: rotate(180deg); }
.card.open .card-hint { color: var(--gold); opacity: 0.8; }

/* ── EXPANDABLE PANEL ── */
.card-panel {
  max-height: 0; overflow: hidden;
  transition: max-height .5s cubic-bezier(.4,0,.2,1);
}
.card.open .card-panel { max-height: 500px; }

.panel-inner {
  padding: 0 16px 20px;
  opacity: 0; transform: translateY(10px);
  transition: opacity .35s .1s, transform .35s .1s;
  display: flex; flex-direction: column; gap: 11px;
}
.card.open .panel-inner { opacity: 1; transform: translateY(0); }

.panel-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,168,75,0.2), transparent);
}

.panel-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px;
}
.panel-row .lbl { color: var(--muted); }
.panel-row .val {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600;
}
.val.struck { text-decoration: line-through; color: var(--muted); font-weight: 400; }
.val.saving { color: var(--green); font-size: 14.5px; font-weight: 700; }
.val.priced { color: var(--gold2); }

/* ── ID INPUT ── */
.id-field { display: flex; flex-direction: column; gap: 6px; margin-top: 2px; }
.id-field label { font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: 0.3px; }

.pid-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 11px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.05);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-size: 14px;
  direction: ltr; text-align: right;
  transition: border-color .25s, box-shadow .25s;
}
.pid-input::placeholder { color: var(--muted); font-family: 'Cairo', sans-serif; font-size: 13px; }
.pid-input:focus {
  outline: none;
  border-color: var(--edge-h);
  box-shadow: 0 0 0 3px rgba(200,168,75,0.1);
}

/* ── ORDER BUTTONS ── */
.order-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 2px;
}

.order-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 15px 10px;
  border: none; border-radius: 13px;
  background: linear-gradient(135deg, #1A4A2A 0%, #1D6B34 50%, #15522A 100%);
  border: 1px solid rgba(37,211,102,0.25);
  color: #e8fef0;
  font-family: 'Cairo', sans-serif; font-size: 13.5px; font-weight: 800;
  cursor: pointer; text-decoration: none;
  position: relative; overflow: hidden;
  transition: filter .25s, transform .2s, box-shadow .25s;
  box-shadow: 0 2px 12px rgba(37,211,102,0.1);
}
.order-btn::before {
  content:'';
  position: absolute; inset:0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform .55s;
}
.order-btn:hover::before { transform: translateX(100%); }
.order-btn:hover {
  filter: brightness(1.12);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(37,211,102,0.2);
}
.order-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.order-btn .num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; direction: ltr; font-weight: 700;
}

/* ─────────────────────────────── FOOTER ─── */
.footer-cta {
  position: relative; z-index: 10;
  max-width: 500px; margin: 0 auto;
  padding: 10px 20px 70px; text-align: center;
}
.footer-cta h3 { font-weight: 800; font-size: 17px; margin-bottom: 7px; }
.footer-cta p { color: var(--muted); font-size: 13px; margin-bottom: 22px; line-height: 1.7; }

.wa-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

.wa-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 12px 22px;
  border: 1px solid rgba(37,211,102,0.2);
  border-radius: 12px;
  background: rgba(37,211,102,0.06);
  color: var(--text);
  font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
  text-decoration: none;
  transition: border-color .25s, background .25s, transform .2s;
}
.wa-btn:hover { border-color: rgba(37,211,102,0.5); background: rgba(37,211,102,0.1); transform: translateY(-1px); }
.wa-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: waPulse 1.8s ease-in-out infinite; }
@keyframes waPulse { 0%,100%{ box-shadow:0 0 5px var(--green); } 50%{ box-shadow:0 0 14px var(--green); } }

.bottom-tag {
  position: relative; z-index: 10;
  text-align: center; padding-bottom: 40px;
  font-size: 11.5px; color: var(--muted); letter-spacing: .5px;
}
.bottom-tag .b { color: var(--gold); font-weight: 800; font-family: 'Space Grotesk', sans-serif; }

/* ─────────────────────────────── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
  .holo-scan::before, .holo-flicker, .holo-rings span { display: none !important; }
}

@media (max-width: 480px) {
  .card-top { grid-template-columns: 44px 1fr auto; gap: 10px; padding: 14px 13px 17px; }
  .card-icon { width: 44px; height: 44px; border-radius: 12px; }
  .card-icon svg { width: 26px; height: 26px; }
  .uc-amount { font-size: 20px; }
  .price-now { font-size: 18px; }
  .order-btn { font-size: 12px; padding: 13px 6px; gap: 6px; }
  .order-btn svg { width: 14px; height: 14px; }
  .order-btn .num { font-size: 11.5px; }
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="glow-canvas"></canvas>
<canvas id="meteor-canvas"></canvas>

<!-- BRAND -->
<div class="brand-wrap">
  <div class="holo-stage" id="holoStage">
    <div class="holo-base"></div>
    <div class="holo-scan"></div>
    <div class="holo-rings">
      <span></span><span></span><span></span>
    </div>
    <div class="logo-orbit holo-logo" id="logoOrbit">
      <div class="logo-disc">
        <div class="logo-text">7S</div>
      </div>
      <div class="holo-lines"></div>
      <div class="holo-flicker"></div>
    </div>
    <div class="holo-particles" id="holoParticles"></div>
  </div>
</div>

<div class="brand-label">
  <div class="brand-title">Premium Store</div>
  <div class="brand-rule"></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>شحن <span class="g">UC</span><br>ببجي موبايل</h1>
  <p class="hero-sub">اضغط على أي باقة لعرض التفاصيل وإتمام الطلب</p>
  <div class="hero-badges">
    <span class="badge"><span class="dot g"></span> تسليم فوري</span>
    <span class="badge"><span class="dot o"></span> أسعار مميزة</span>
    <span class="badge"><span class="dot g"></span> شحن آمن 100%</span>
  </div>
</div>

<!-- CARDS -->
<div class="list-wrap" id="list"></div>

<script>
/* ── STARS ── */
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let W, H, stars;
  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  function mkStar(){ return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*0.9+0.2, a:Math.random(), da:(Math.random()-.5)*.006 }; }
  function init(){ resize(); stars = Array.from({length:110}, mkStar); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a += s.da;
      if(s.a<=0||s.a>=1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,220,160,${s.a * 0.55})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  init(); draw();
  window.addEventListener('resize', init);
})();

/* ── METEORS ── */
(function(){
  const c = document.getElementById('meteor-canvas');
  const ctx = c.getContext('2d');
  let W, H, meteors;

  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function spawn(){
    const len = 160 + Math.random()*180;
    const speed = 7 + Math.random()*6;
    const angle = (28 + Math.random()*22) * Math.PI/180; // زاوية انحدار
    return {
      x: Math.random()*W*1.15 - W*0.1,
      y: -40 - Math.random()*120,
      len, speed, angle,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      fade: 0.009 + Math.random()*0.007,
      w: 2.2 + Math.random()*1.8,
    };
  }

  function init(){
    resize();
    meteors = [];
  }

  let spawnTimer = 0;
  function maybeSpawn(){
    spawnTimer--;
    if(spawnTimer <= 0){
      meteors.push(spawn());
      spawnTimer = 14 + Math.random()*26; // وتيرة كثيفة
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    maybeSpawn();

    meteors.forEach(m=>{
      m.x += m.vx; m.y += m.vy;
      m.life -= m.fade;

      const tailX = m.x - Math.cos(m.angle)*m.len;
      const tailY = m.y - Math.sin(m.angle)*m.len;
      const grad = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255,250,222,${1*m.life})`);
      grad.addColorStop(0.35, `rgba(245,222,140,${0.65*m.life})`);
      grad.addColorStop(1, `rgba(200,168,75,0)`);

      ctx.save();
      ctx.shadowColor = `rgba(245,222,140,${0.9*m.life})`;
      ctx.shadowBlur = 14;
      ctx.strokeStyle = grad;
      ctx.lineWidth = m.w;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
      ctx.restore();

      // رأس متوهج
      ctx.save();
      ctx.shadowColor = `rgba(255,250,225,${1*m.life})`;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.w*1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,252,235,${1*m.life})`;
      ctx.fill();
      ctx.restore();
    });

    meteors = meteors.filter(m => m.life > 0 && m.y < H+150 && m.x < W+150);
    requestAnimationFrame(draw);
  }

  init(); draw();
  window.addEventListener('resize', resize);
})();

/* ── AMBIENT GLOW ── */
(function(){
  const c = document.getElementById('glow-canvas');
  const ctx = c.getContext('2d');
  let W, H, blobs;
  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = document.documentElement.scrollHeight;
  }
  const PAL = ['180,140,55','140,100,30','90,75,190'];
  function mkBlob(){ return { x:Math.random()*W, y:Math.random()*H, r:200+Math.random()*280, vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.18, hue:PAL[Math.floor(Math.random()*PAL.length)], a:0.05+Math.random()*0.06 }; }
  function initBlobs(){ blobs = Array.from({length:5}, mkBlob); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    blobs.forEach(b=>{
      b.x+=b.vx; b.y+=b.vy;
      if(b.x<-b.r) b.x=W+b.r; if(b.x>W+b.r) b.x=-b.r;
      if(b.y<-b.r) b.y=H+b.r; if(b.y>H+b.r) b.y=-b.r;
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,`rgba(${b.hue},${b.a})`);
      g.addColorStop(1,`rgba(${b.hue},0)`);
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); initBlobs(); draw();
  window.addEventListener('resize',()=>{resize();initBlobs();});
})();
